<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>物种卡牌：男人图鉴 · 分页图鉴</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0c0e18, #020308);
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, 'Courier New', monospace;
            min-height: 100vh;
            padding: 1rem 1rem 5rem 1rem;
            color: #ece9e0;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* 头部 */
        .game-header {
            text-align: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255, 200, 100, 0.3);
            padding-bottom: 0.8rem;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #FFE6B0, #FFB347, #FF8C5A);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .sub {
            font-size: 0.7rem;
            opacity: 0.65;
            font-family: monospace;
        }

        /* 统计栏 */
        .stats-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 0.8rem;
            background: rgba(15, 20, 30, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 0.5rem 1.2rem;
            margin-bottom: 1.8rem;
            border: 0.5px solid rgba(255, 200, 100, 0.4);
        }

        .stat {
            background: #00000040;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .stat span {
            color: #FFC857;
            font-size: 1.2rem;
            margin-right: 5px;
        }

        .reset-icon {
            background: #2c2430;
            padding: 4px 14px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: 0.2s;
            border: 1px solid #ffb34755;
        }
        .reset-icon:active { transform: scale(0.96); background: #4a3a44;}

        .achievement-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .milestone {
            font-size: 0.6rem;
            background: #2a2a2e;
            padding: 2px 8px;
            border-radius: 30px;
            color: #aaa;
        }
        .milestone.unlock {
            background: #f3b33d;
            color: #121212;
            font-weight: bold;
            box-shadow: 0 0 4px #ffaa44;
        }

        /* 页面切换 */
        .page {
            transition: opacity 0.2s;
        }
        .hidden {
            display: none;
        }

        /* 抽卡舞台 */
        .draw-stage {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 48px;
            padding: 1.2rem;
            margin-bottom: 1rem;
        }

        /* 完整卡牌造型（无抽卡等级） */
        .card {
            background: linear-gradient(145deg, #191e2c, #10131f);
            border-radius: 32px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 190, 80, 0.5);
            box-shadow: 0 20px 30px -12px black;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            border-bottom: 2px dashed #ffb34755;
            padding-bottom: 12px;
            margin-bottom: 16px;
        }

        .card-name {
            font-size: 1.6rem;
            font-weight: 800;
            color: #FFE3A4;
        }

        .card-number {
            font-family: monospace;
            background: #00000060;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.8rem;
        }

        .orig-rarity {
            display: inline-block;
            background: #1f2538;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .skill, .difficulty, .tame {
            margin-top: 14px;
            background: rgba(0, 0, 0, 0.4);
            padding: 12px 14px;
            border-radius: 24px;
            font-size: 0.85rem;
            line-height: 1.4;
            border-left: 4px solid #ffaa55;
        }
        .skill span, .difficulty span, .tame span {
            font-weight: bold;
            color: #FFD966;
            display: inline-block;
            width: 80px;
        }

        /* 图鉴分页网格 */
        .collection-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin: 0.5rem 0 1rem;
            flex-wrap: wrap;
            gap: 10px;
        }
        .pagination {
            display: flex;
            gap: 8px;
            justify-content: center;
            align-items: center;
            margin: 20px 0 10px;
        }
        .page-btn {
            background: #2a2a36;
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            color: #FFE2B5;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
        }
        .page-btn.active {
            background: #e58e1a;
            color: #1e170a;
            box-shadow: 0 0 6px #ffaa55;
        }
        .page-btn:active { transform: scale(0.96); }

        .pokedex-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            padding: 6px 4px;
            min-height: 400px;
        }
        .dex-card {
            background: rgba(20, 25, 38, 0.9);
            backdrop-filter: blur(4px);
            border-radius: 24px;
            padding: 1rem;
            border: 1px solid #2a324b;
            cursor: pointer;
            transition: all 0.15s;
        }
        .dex-card.collected {
            border-left: 5px solid #FFB347;
            background: #12182a;
        }
        .dex-card.uncollected {
            opacity: 0.65;
            filter: grayscale(0.2);
        }
        .dex-card:active { transform: scale(0.98); }
        .dex-name {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
        }
        .dex-number {
            font-size: 0.75rem;
            color: #bfb48a;
            font-family: monospace;
        }
        .dex-rarity {
            font-size: 0.7rem;
            background: #00000050;
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            margin-top: 6px;
        }

        /* 模态框详情 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal.show {
            visibility: visible;
            opacity: 1;
        }
        .modal-content {
            background: #121724;
            max-width: 90%;
            width: 450px;
            border-radius: 40px;
            padding: 1.8rem;
            border: 1px solid #ffb347;
            position: relative;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-close {
            position: absolute;
            top: 12px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #ffaa55;
        }
        .modal-card-name {
            font-size: 1.6rem;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .modal-detail {
            margin-top: 16px;
        }
        .modal-detail p {
            margin-bottom: 14px;
            line-height: 1.4;
        }
        .modal-detail strong {
            color: #FFD966;
        }

        /* 底部三按钮 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(8, 10, 18, 0.95);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-around;
            padding: 10px 20px;
            border-top: 1px solid rgba(255, 200, 100, 0.4);
            z-index: 100;
        }
        .nav-btn {
            flex: 1;
            margin: 0 8px;
            background: #2a2a36;
            border: none;
            padding: 12px 0;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 40px;
            color: #FFE2B5;
            font-family: monospace;
            cursor: pointer;
            transition: 0.1s;
        }
        .nav-btn:active { transform: scale(0.97); background: #4a4a5a; }
        .nav-btn.special { background: #e58e1a; color: #1e170a; box-shadow: 0 2px 8px rgba(229,142,26,0.3); }

        .toast-msg {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #000000dd;
            backdrop-filter: blur(16px);
            padding: 8px 20px;
            border-radius: 60px;
            color: #FFDE9E;
            font-weight: bold;
            font-size: 0.85rem;
            z-index: 2001;
            pointer-events: none;
            border-left: 3px solid #ffaa55;
            white-space: nowrap;
        }
        @media (max-width: 600px) {
            .pokedex-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
            .card-name { font-size: 1.3rem; }
            .nav-btn { font-size: 1rem; padding: 10px 0; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="game-header">
        <h1>⚡ 物种卡牌 · 男人图鉴 ⚡</h1>
        <div class="sub">「抽卡观察 · 点击卡牌查看详情」</div>
    </div>

    <div class="stats-panel">
        <div class="stat">🎴 抽卡次数 <span id="drawCount">0</span></div>
        <div class="stat">📖 图鉴 <span id="collectionCount">0</span> / <span id="totalCards">0</span></div>
        <div class="achievement-strip" id="milestoneWrap"></div>
        <div class="reset-icon" id="resetBtn">⟳ 重置进度</div>
    </div>

    <!-- 抽卡页面 -->
    <div id="drawPage" class="page">
        <div class="draw-stage">
            <div id="currentCardArea">
                <div class="card" style="min-height: 280px; display: flex; align-items: center; justify-content: center; flex-direction: column;">
                    <div style="text-align: center; opacity: 0.7;">✨ 点击底部「抽卡」解锁物种档案 ✨</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 图鉴页面（分页） -->
    <div id="bookPage" class="page hidden">
        <div class="collection-header">
            <span>🗂️ 分页图鉴 · 共35种</span>
            <span style="font-size:0.7rem;">(单击卡片查看完整信息)</span>
        </div>
        <div class="pokedex-grid" id="pokedexGrid"></div>
        <div class="pagination" id="paginationControls"></div>
    </div>
</div>

<!-- 底部三按钮 -->
<div class="bottom-nav">
    <button class="nav-btn" id="gotoBookBtn">📖 图鉴</button>
    <button class="nav-btn special" id="drawBottomBtn">🎴 抽卡</button>
    <button class="nav-btn" id="backToDrawBtn">↺ 返回</button>
</div>

<!-- 模态框 -->
<div id="cardModal" class="modal">
    <div class="modal-content">
        <span class="modal-close" id="closeModal">&times;</span>
        <div id="modalBody"></div>
    </div>
</div>

        { id:24, number:"#27", name:"气球男", origRarity:"传说级", passive:"虚张声势 · 吹嘘成瘾，谎造人设，虚荣膨胀。", difficulty:"易燃易爆 · 经不起细查，怕被比下去。", tame:"冷漠无视降维打击，当众戳破牛皮。", gameLevel:"SR" },
        { id:25, number:"#28", name:"野猪男", origRarity:"普通级", passive:"原始本能 · 懒惰邋遢，即时行乐，责任绝缘。", difficulty:"重度污染 · 从不规划，自恋值MAX。", tame:"军事化管理+保姆监督，停止过度服务。", gameLevel:"R" },
        { id:26, number:"#29", name:"孔雀男", origRarity:"传说级", passive:"华丽绽放 · 虚荣自恋，外表炫耀，心灵肤浅。", difficulty:"高危预警 · 依赖外表虚荣，浅层生存。", tame:"镜像迎合掌控高位，满足虚荣心。", gameLevel:"SSR" },
        { id:27, number:"#30", name:"延长线男", origRarity:"传说级", passive:"无限延伸 · 双性恋属性，多情流动。", difficulty:"极不稳定 · 偷腥几率大，流动性强。", tame:"全方位吸引力，知己策略，不试图独占。", gameLevel:"SSR" },
        { id:28, number:"#31", name:"太极男", origRarity:"传说级", passive:"借力打力 · 表里不一，暧昧拒绝承诺。", difficulty:"地狱级 · 虚伪狡猾，忠诚度极低。", tame:"绝对清醒反向拿捏，打破砂锅问到底。", gameLevel:"SSR" },
        { id:29, number:"#32", name:"烟花男", origRarity:"传说级", passive:"梦想爆破 · 天马行空，光说不练，幻想逃避。", difficulty:"易燃易爆 · 玻璃心，活在幻想中。", tame:"顺毛捋+落地引导，去敏化训练不吓他。", gameLevel:"SR" },
        { id:30, number:"#33", name:"沟鼠男", origRarity:"???", passive:"暗影潜行 · 窥私狂，边界感缺失，翻隐私。", difficulty:"极度高危 · 信任破产，偷窃倾向。", tame:"物理隔绝雷霆震怒，道德碾压，带看心理医生。", gameLevel:"SSR" },
        { id:31, number:"#34", name:"针眼男", origRarity:"传说级", passive:"针孔窥心 · 心胸狭窄，斤斤计较，嫉妒心MAX。", difficulty:"地狱级 · 小心眼，霸道任性。", tame:"降维包容情绪压制，不指责小心眼。", gameLevel:"SR" },
        { id:32, number:"#35", name:"琉璃男", origRarity:"易碎级", passive:"虚假璀璨 · 表象华丽，缺乏内核，依赖家庭。", difficulty:"高维护 · 诱惑多，历史负债。", tame:"独立断奶，撕开滤镜长期观察。", gameLevel:"SSR" },
        { id:33, number:"#36", name:"木头男", origRarity:"稳定型", passive:"深度沉浸 · 专注专业，生活白痴，专一可靠。", difficulty:"中低耐心解码 · 不懂风情，钝感MAX。", tame:"直球沟通，放弃改造，接受朴实。", gameLevel:"R" },
        { id:34, number:"#37", name:"轮盘男", origRarity:"高危级", passive:"赌徒狂热 · 投机好赌，享受刺激，赌性难改。", difficulty:"地狱级 · 倾家荡产，侥幸值MAX。", tame:"绝对财务隔离，切断源头，不指望戒赌。", gameLevel:"SSR" }
    ];

    const TOTAL = SPECIES_DATA.length;
    document.getElementById('totalCards').innerText = TOTAL;

    // 游戏状态
    let drawCount = 0;
    let collectedSet = new Set();
    let milestones = {5:false,10:false,15:false,20:false,25:false,30:false,35:false};
    let currentPage = 1;
    const PAGE_SIZE = 7;
    const TOTAL_PAGES = Math.ceil(TOTAL / PAGE_SIZE);

    // 音效
    let audioCtx = null;
    function initAudio() { if(!audioCtx && window.AudioContext) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function playBeep(freq=880, duration=0.2, volume=0.12) {
        if(!audioCtx) initAudio();
        if(!audioCtx) return;
        if(audioCtx.state === 'suspended') audioCtx.resume().catch(e=>{});
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.value = volume;
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.stop(audioCtx.currentTime + duration);
    }
    function playDrawSound() { playBeep(880,0.18,0.1); setTimeout(()=>{ playBeep(660,0.16,0.09); },50); }
    function playNewCardSound() { playBeep(1318,0.24,0.12); playBeep(1568,0.26,0.1); }

    function showToast(msg) {
        let toast = document.querySelector('.toast-msg');
        if(toast) toast.remove();
        let div = document.createElement('div');
        div.className = 'toast-msg';
        div.innerText = msg;
        document.body.appendChild(div);
        setTimeout(()=>{ div.style.opacity='0'; setTimeout(()=>div.remove(),500); },2000);
    }

    function updateMilestoneUI() {
        const container = document.getElementById('milestoneWrap');
        container.innerHTML = '';
        const list = [5,10,15,20,25,30,35];
        let num = collectedSet.size;
        list.forEach(m => {
            let unlocked = (num >= m) || (m===35 && num===TOTAL);
            let span = document.createElement('span');
            span.className = `milestone ${unlocked ? 'unlock' : ''}`;
            span.innerText = m===35 ? '全收集' : `${m}种`;
            container.appendChild(span);
        });
    }

    function checkAchievements() {
        let num = collectedSet.size;
        let newly = [];
        if(num >=5 && !milestones[5]) { milestones[5]=true; newly.push('【初识物种】集齐5种'); }
        if(num >=10 && !milestones[10]) { milestones[10]=true; newly.push('【明察秋毫】10种'); }
        if(num >=15 && !milestones[15]) { milestones[15]=true; newly.push('【洞悉危险】15种'); }
        if(num >=20 && !milestones[20]) { milestones[20]=true; newly.push('【人性解码】20种'); }
        if(num >=25 && !milestones[25]) { milestones[25]=true; newly.push('【高等观察者】25种'); }
        if(num >=30 && !milestones[30]) { milestones[30]=true; newly.push('【接近真理】30种'); }
        if(num === TOTAL && !milestones[35]) { milestones[35]=true; newly.push('🏆 终极成就 · 全图鉴制霸 🏆'); }
        newly.forEach(ach => showToast(ach));
        updateMilestoneUI();
        saveGame();
    }

    // 抽卡权重 (内部)
    function drawByWeight() {
        let r = Math.random();
        let target = '';
        if (r < 0.55) target = 'R';
        else if (r < 0.85) target = 'SR';
        else target = 'SSR';
        let pool = SPECIES_DATA.filter(c => c.gameLevel === target);
        if(pool.length === 0) pool = SPECIES_DATA;
        return pool[Math.floor(Math.random() * pool.length)];
    }

    function renderCurrentCard(card) {
        const container = document.getElementById('currentCardArea');
        container.innerHTML = `
            <div class="card">
                <div class="card-header">
                    <div class="card-name">${card.name}</div>
                    <div class="card-number">${card.number}</div>
                </div>
                <div class="orig-rarity">⭐ 稀有度 · ${card.origRarity}</div>
                <div class="skill"><span>⚡被动技能</span> ${card.passive}</div>
                <div class="difficulty"><span>⚠️副本难度</span> ${card.difficulty}</div>
                <div class="tame"><span>📖驯养秘籍</span> ${card.tame}</div>
            </div>
        `;
    }

    function doDraw() {
        playDrawSound();
        drawCount++;
        document.getElementById('drawCount').innerText = drawCount;
        const drawn = drawByWeight();
        const wasNew = !collectedSet.has(drawn.id);
        renderCurrentCard(drawn);
        if (wasNew) {
            collectedSet.add(drawn.id);
            playNewCardSound();
            showToast(`✨ 图鉴新增 · ${drawn.name} ✨`);
            renderPagedGrid();   // 刷新图鉴当前页
            checkAchievements();
        } else {
            showToast(`🃏 重复物种：${drawn.name}，继续观察深渊`);
        }
        document.getElementById('collectionCount').innerText = collectedSet.size;
        saveGame();
        showDrawPage();   // 抽卡后自动切回抽卡页
    }

    // 图鉴分页渲染 (只显示编号、名字、稀有度)
    function renderPagedGrid() {
        const start = (currentPage - 1) * PAGE_SIZE;
        const end = start + PAGE_SIZE;
        const pageCards = SPECIES_DATA.slice(start, end);
        const grid = document.getElementById('pokedexGrid');
        grid.innerHTML = '';
        pageCards.forEach(card => {
            const owned = collectedSet.has(card.id);
            const div = document.createElement('div');
            div.className = `dex-card ${owned ? 'collected' : 'uncollected'}`;
            div.innerHTML = `
                <div class="dex-name">
                    <span>${card.name}</span>
                    <span class="dex-number">${card.number}</span>
                </div>
                <div class="dex-rarity">${card.origRarity}</div>
            `;
            div.addEventListener('click', (e) => {
                e.stopPropagation();
                showCardDetail(card);
            });
            grid.appendChild(div);
        });
        renderPaginationControls();
        document.getElementById('collectionCount').innerText = collectedSet.size;
    }

    function renderPaginationControls() {
        const container = document.getElementById('paginationControls');
        container.innerHTML = '';
        for (let i = 1; i <= TOTAL_PAGES; i++) {
            const btn = document.createElement('button');
            btn.innerText = i;
            btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
            btn.addEventListener('click', () => {
                currentPage = i;
                renderPagedGrid();
            });
            container.appendChild(btn);
        }
    }

    // 单击卡片显示完整详情 (模态框)
    function showCardDetail(card) {
        const modal = document.getElementById('cardModal');
        const modalBody = document.getElementById('modalBody');
        modalBody.innerHTML = `
            <div class="modal-card-name">${card.number} · ${card.name}</div>
            <div class="orig-rarity" style="margin-bottom:12px;">⭐ 稀有度 · ${card.origRarity}</div>
            <div class="modal-detail">
                <p><strong>⚡ 被动技能</strong><br>${card.passive}</p>
                <p><strong>⚠️ 副本难度</strong><br>${card.difficulty}</p>
                <p><strong>📖 驯养秘籍</strong><br>${card.tame}</p>
            </div>
        `;
        modal.classList.add('show');
    }

    function closeModal() {
        document.getElementById('cardModal').classList.remove('show');
    }

    // 页面切换
    function showDrawPage() {
        document.getElementById('drawPage').classList.remove('hidden');
        document.getElementById('bookPage').classList.add('hidden');
    }
    function showBookPage() {
        renderPagedGrid();   // 刷新当前页
        document.getElementById('drawPage').classList.add('hidden');
        document.getElementById('bookPage').classList.remove('hidden');
    }

    // 本地存储
    function saveGame() {
        localStorage.setItem('menCard_drawCount', drawCount);
        localStorage.setItem('menCard_collected', JSON.stringify(Array.from(collectedSet)));
        localStorage.setItem('menCard_milestones', JSON.stringify(milestones));
    }
    function loadGame() {
        let savedDraw = localStorage.getItem('menCard_drawCount');
        if(savedDraw !== null) drawCount = parseInt(savedDraw);
        let savedCol = localStorage.getItem('menCard_collected');
        if(savedCol !== null) collectedSet = new Set(JSON.parse(savedCol));
        let savedMil = localStorage.getItem('menCard_milestones');
        if(savedMil !== null) milestones = JSON.parse(savedMil);
        document.getElementById('drawCount').innerText = drawCount;
        document.getElementById('collectionCount').innerText = collectedSet.size;
        checkAchievements();
        if(collectedSet.size > 0) {
            let anyId = Array.from(collectedSet)[0];
            let anyCard = SPECIES_DATA.find(c=>c.id === anyId);
            if(anyCard) renderCurrentCard(anyCard);
            else renderCurrentCard(SPECIES_DATA[0]);
        } else {
            document.getElementById('currentCardArea').innerHTML = `<div class="card" style="min-height:280px; display:flex; align-items:center; justify-content:center;">✨ 点击底部「抽卡」开始收集 ✨</div>`;
        }
        showDrawPage();
    }

    function resetGame() {
        if(confirm('⚠️ 重置将清空所有抽卡次数及图鉴，无法恢复。确定？')) {
            drawCount = 0;
            collectedSet.clear();
            milestones = {5:false,10:false,15:false,20:false,25:false,30:false,35:false};
            saveGame();
            document.getElementById('drawCount').innerText = 0;
            document.getElementById('collectionCount').innerText = 0;
            document.getElementById('currentCardArea').innerHTML = `<div class="card" style="min-height:280px; display:flex; align-items:center; justify-content:center;">✨ 图鉴已重置 · 点击抽卡 ✨</div>`;
            showToast('数据已清空，新轮回开始');
            updateMilestoneUI();
            renderPagedGrid();
            showDrawPage();
        }
    }

    // 事件绑定
    document.getElementById('drawBottomBtn').addEventListener('click', () => { doDraw(); });
    document.getElementById('gotoBookBtn').addEventListener('click', () => { showBookPage(); });
    document.getElementById('backToDrawBtn').addEventListener('click', () => { showDrawPage(); });
    document.getElementById('resetBtn').addEventListener('click', () => { resetGame(); });
    document.getElementById('closeModal').addEventListener('click', closeModal);
    window.addEventListener('click', (e) => { if(e.target === document.getElementById('cardModal')) closeModal(); });

    window.onload = () => { initAudio(); loadGame(); };
    document.body.addEventListener('touchstart', ()=>{ if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); }, { once: true });
</script>
</body>
</html>
